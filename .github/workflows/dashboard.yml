name: Repo Health Dashboard

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6am UTC
  workflow_dispatch:        # Manual trigger
    inputs:
      deploy_target:
        description: 'Deploy target'
        required: false
        default: 'both'
        type: choice
        options: [s3, none]

permissions:
  contents: read
  id-token: write

concurrency:
  group: "dashboard"
  cancel-in-progress: false

jobs:
  build-dashboard:
    name: Collect metrics & build dashboard
    runs-on: ubuntu-latest
    outputs:
      artifact-path: ${{ steps.build.outputs.artifact-path }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests python-dateutil jinja2 --quiet

      - name: Collect repo metrics
        id: collect
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_USERNAME: Specter099
        run: python collect_metrics.py

      - name: Build HTML dashboard
        id: build
        run: |
          python build_dashboard.py
          echo "artifact-path=dist/" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: dashboard
          path: dist/
          retention-days: 7

  deploy-s3:
    name: Deploy to S3
    needs: build-dashboard
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.deploy_target == 's3'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: dashboard
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Deploy to S3
        env:
          BUCKET: ${{ secrets.DASHBOARD_BUCKET }}   # e.g. repo-health-451645558365-us-east-1-an
        run: |
          aws s3 sync dist/ "s3://$BUCKET/" \
            --delete \
            --cache-control "max-age=300,public" \
            --metadata-directive REPLACE

          echo "S3 deployment complete: https://${BUCKET}.s3-website-us-east-1.amazonaws.com"

      - name: Invalidate CloudFront (if configured)
        continue-on-error: true
        env:
          CF_DIST: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        if: env.CF_DIST != ''
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CF_DIST" \
            --paths "/*"
          echo "CloudFront invalidation submitted"
